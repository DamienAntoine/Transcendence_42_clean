services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - shared-certs:/app/certs
      - /app/node_modules
    # environment:
    #   - FRONTEND_URL=https://localhost:5173
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - shared-certs:/app/certs:ro
      - /app/node_modules
    # environment:
    #   - VITE_API_URL=https://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  shared-certs:
